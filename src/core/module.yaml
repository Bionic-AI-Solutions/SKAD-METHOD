code: core
name: "SKad Core Module"

header: "SKad Core Configuration"
subheader: "Configure the core settings for your SKad installation.\nThese settings will be used across all installed skad skills, workflows, and agents."

user_name:
  prompt: "What should agents call you? (Use your name or a team name)"
  default: "SKad"
  result: "{value}"

communication_language:
  prompt: "What language should agents use when chatting with you?"
  default: "English"
  result: "{value}"

document_output_language:
  prompt: "Preferred document output language?"
  default: "English"
  result: "{value}"

output_folder:
  prompt: "Where should output files be saved?"
  default: "_skad-output"
  result: "{project-root}/{value}"
